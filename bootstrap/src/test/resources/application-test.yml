micronaut:
  application:
    name: parking-management-test
  server:
    port: -1

datasources:
  default:
    url: jdbc:h2:mem:parking;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
    dialect: H2

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop

flyway:
  datasources:
    default:
      enabled: false

garage-simulator:
  base-url: http://localhost
