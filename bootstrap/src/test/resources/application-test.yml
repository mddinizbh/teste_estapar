micronaut:
  application:
    name: parking-management-test
  server:
    port: -1

datasources:
  default:
    url: jdbc:tc:mysql:8:///parking?TC_DAEMON=true
    driverClassName: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: root
    password: root
    dialect: MYSQL

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: none

flyway:
  datasources:
    default:
      enabled: true

garage-simulator:
  base-url: http://localhost
